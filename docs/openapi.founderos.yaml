openapi: 3.1.0
info:
  title: Founderos APS v1
  version: 1.0.0
  description: Minimal APS-aligned control plane for a Custom GPT action backend on Vercel.
servers:
  - url: https://founderos-5hj8l08i5-andysalvos-projects.vercel.app
components:
  securitySchemes:
    FounderosApiKey:
      type: apiKey
      in: header
      name: x-founderos-key
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
      required: [ok, error]
      additionalProperties: true
    RequestIdErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
        request_id:
          type: string
      required: [ok, error, request_id]
      additionalProperties: false
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ok, service, version, timestamp]
      additionalProperties: false
    Endpoint:
      type: object
      properties:
        operationId:
          type: string
        method:
          type: string
        path:
          type: string
        auth:
          type: string
        purpose:
          type: string
      required: [operationId, method, path, auth, purpose]
      additionalProperties: false
    CapabilitiesResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string
        version:
          type: string
        openapi:
          type: object
          properties:
            path:
              type: string
            version:
              type: string
          required: [path, version]
          additionalProperties: false
        auth:
          type: object
          properties:
            type:
              type: string
            header:
              type: string
            configured:
              type: boolean
          required: [type, header, configured]
          additionalProperties: false
        operator_inputs:
          type: object
          properties:
            required_env:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  required_for:
                    type: array
                    items:
                      type: string
                  configured:
                    type: boolean
                required: [name, required_for, configured]
            missing_env:
              type: array
              items:
                type: string
            readiness:
              type: object
              properties:
                planning_ready:
                  type: boolean
                openclaw_runtime_ready:
                  type: boolean
                commit_ready:
                  type: boolean
                gpt_action_ready:
                  type: boolean
              required: [planning_ready, openclaw_runtime_ready, commit_ready, gpt_action_ready]
            next_operator_steps:
              type: array
              items:
                type: string
        boundaries:
          type: object
          properties:
            narrow_commitment_boundary:
              type: boolean
            planning_only_precommit:
              type: boolean
            explicit_authorization_required:
              type: boolean
            protected_path_policy_enforced:
              type: boolean
            witness_before_write_required:
              type: boolean
            server_side_secret_handling:
              type: boolean
          required:
            - narrow_commitment_boundary
            - planning_only_precommit
            - explicit_authorization_required
            - protected_path_policy_enforced
            - witness_before_write_required
            - server_side_secret_handling
          additionalProperties: false
        protected_paths:
          type: array
          items:
            type: string
        allowed_repos:
          type: array
          items:
            type: string
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/Endpoint"
      required:
        - ok
        - service
        - version
        - openapi
        - auth
        - operator_inputs
        - boundaries
        - protected_paths
        - allowed_repos
        - endpoints
      additionalProperties: false
    PrecommitPlanRequest:
      type: object
      description: Send only a plain-language task request unless scope or constraints are necessary.
      properties:
        user_request:
          type: string
          description: Plain-language request for proposal mode. Best reliability comes from sending only this field.
          example: Make Founderos more usable inside one thread while preserving the agency boundary.
        scope:
          type: object
          description: Optional repo scope for planning only.
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
          additionalProperties: false
        constraints:
          type: array
          description: Optional guardrails for the proposal.
          items:
            type: string
      required: [user_request]
      additionalProperties: false
    PlanArtifact:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        mode:
          type: string
          enum: [proposal_only]
        human_readable_summary:
          type: string
        intended_tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              purpose:
                type: string
            required: [name, purpose]
            additionalProperties: false
        intended_writes:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              action:
                type: string
                enum: [create, update, delete]
              summary:
                type: string
            required: [path, action, summary]
            additionalProperties: false
        constraints:
          type: array
          items:
            type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
          required: [repo, branch, allowed_paths, forbidden_paths]
          additionalProperties: false
        warnings:
          type: array
          items:
            type: string
        next_step:
          type: string
        content_hash:
          type: string
      required:
        - id
        - created_at
        - mode
        - human_readable_summary
        - intended_tools
        - intended_writes
        - constraints
        - scope
        - warnings
        - next_step
        - content_hash
      additionalProperties: false
    PrecommitPlanResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        artifact:
          $ref: "#/components/schemas/PlanArtifact"
      required: [ok, artifact]
      additionalProperties: false
    OpenClawInspectRequest:
      type: object
      description: Analysis-only OpenClaw request. Use this for inspection and proposal support, not execution.
      properties:
        task:
          type: string
          description: Plain-language analysis task. Must not ask for execution, commits, deployment, or writes.
          example: Inspect the current Founderos contract and identify the next smallest APS-safe improvement.
        repo:
          type: string
          description: Optional repo identifier for context only.
        branch:
          type: string
          description: Optional branch name for context only.
        context:
          type: string
          description: Optional extra analysis context. Must remain read-only and proposal-oriented.
      required: [task]
      additionalProperties: false
    OpenClawInspectResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        runtime:
          type: string
          enum: [openclaw]
        mode:
          type: string
          enum: [analysis_only]
        summary:
          type: string
        findings:
          type: array
          items:
            type: string
        suggested_next_actions:
          type: array
          items:
            type: string
        request_id:
          type: string
      required:
        - ok
        - runtime
        - mode
        - summary
        - findings
        - suggested_next_actions
        - request_id
      additionalProperties: false
    WriteFile:
      type: object
      properties:
        path:
          type: string
        action:
          type: string
          enum: [create, update]
        content:
          type: string
      required: [path, action, content]
      additionalProperties: false
    WriteSet:
      type: object
      properties:
        branch_name:
          type: string
        base_branch:
          type: string
        title:
          type: string
        body:
          type: string
        repo:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/WriteFile"
          minItems: 1
      required: [branch_name, base_branch, title, repo, files]
      additionalProperties: false
    CommitAuthorization:
      type: object
      properties:
        plan_artifact_id:
          type: string
        plan_artifact_hash:
          type: string
        write_set_hash:
          type: string
        authorized_by:
          type: string
      required: [plan_artifact_id, plan_artifact_hash, write_set_hash, authorized_by]
      additionalProperties: false
    CommitExecuteRequest:
      type: object
      properties:
        write_set:
          $ref: "#/components/schemas/WriteSet"
        authorization:
          $ref: "#/components/schemas/CommitAuthorization"
      required: [write_set, authorization]
      additionalProperties: false
    CommitExecuteResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        execution:
          type: object
          properties:
            pr_url:
              type: string
              format: uri
            pr_number:
              type: integer
            branch:
              type: string
            repo:
              type: string
            files_written:
              type: integer
            write_set_hash:
              type: string
          required: [pr_url, pr_number, branch, repo, files_written, write_set_hash]
          additionalProperties: false
        witness:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
          required: [id, type]
          additionalProperties: false
      required: [ok, execution, witness]
      additionalProperties: false
paths:
  /api/founderos/health:
    get:
      operationId: health
      summary: Public liveness check
      security: []
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/capabilities:
    get:
      operationId: capabilities
      summary: Describe the exact v1 control-plane contract
      security:
        - FounderosApiKey: []
      responses:
        "200":
          description: Capabilities returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/precommit/plan:
    post:
      operationId: precommitPlan
      summary: Produce a proposal artifact only
      description: Call this with a single plain-language `user_request` string. Do not send authorization or write_set fields.
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrecommitPlanRequest"
            example:
              user_request: Make Founderos more usable inside one thread while preserving the agency boundary.
      responses:
        "200":
          description: Proposal artifact returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrecommitPlanResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/runtime/openclaw/inspect:
    post:
      operationId: openclawInspect
      summary: Run analysis-only OpenClaw inspection through Founderos
      description: |
        Call OpenClaw server-side through Founderos for APS-safe inspection and proposal support.
        This route rejects write, commit, deploy, or execute-oriented requests.
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenClawInspectRequest"
            example:
              task: Inspect the current Founderos contract and identify the next smallest APS-safe improvement.
              repo: andysalvo/founderos
              branch: main
      responses:
        "200":
          description: OpenClaw analysis returned in normalized Founderos format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenClawInspectResponse"
        "400":
          description: Invalid request body or write/commit-oriented request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestIdErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestIdErrorResponse"
        "500":
          description: OpenClaw runtime not configured in Vercel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestIdErrorResponse"
        "502":
          description: OpenClaw upstream failure or unusable response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestIdErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestIdErrorResponse"
  /api/founderos/commit/execute:
    post:
      operationId: commitExecute
      summary: Execute one exact, pre-authorized write set
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitExecuteRequest"
      responses:
        "200":
          description: Pull request opened from the exact authorized write set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitExecuteResponse"
        "400":
          description: Invalid request body or hash mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Repo or path rejected by server policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing required server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Witness sink or GitHub API failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
