openapi: 3.1.0
info:
  title: Founderos APS
  version: 1.0.0
  description: Minimal APS-aligned control plane for a Custom GPT action backend on Vercel.
servers:
  - url: https://founderos-alpha.vercel.app
security:
  - FounderosApiKey: []
components:
  securitySchemes:
    FounderosApiKey:
      type: apiKey
      in: header
      name: x-founderos-key
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
      required: [ok, error]
      additionalProperties: true
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ok, service, version, timestamp]
      additionalProperties: false
    Endpoint:
      type: object
      properties:
        operationId:
          type: string
        method:
          type: string
        path:
          type: string
        auth:
          type: string
        purpose:
          type: string
      required: [operationId, method, path, auth, purpose]
      additionalProperties: false
    CapabilitiesResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        service:
          type: string
        version:
          type: string
        openapi:
          type: object
          properties:
            path:
              type: string
            version:
              type: string
          required: [path, version]
          additionalProperties: false
        auth:
          type: object
          properties:
            type:
              type: string
            header:
              type: string
            configured:
              type: boolean
          required: [type, header, configured]
          additionalProperties: false
        worker_auth:
          type: object
          properties:
            type:
              type: string
            header:
              type: string
            configured:
              type: boolean
          required: [type, header, configured]
          additionalProperties: false
        boundaries:
          type: object
          properties:
            narrow_commitment_boundary:
              type: boolean
            planning_only_precommit:
              type: boolean
            explicit_authorization_required:
              type: boolean
            protected_path_policy_enforced:
              type: boolean
            witness_before_write_required:
              type: boolean
            server_side_secret_handling:
              type: boolean
            worker_lane_separated:
              type: boolean
          required:
            - narrow_commitment_boundary
            - planning_only_precommit
            - explicit_authorization_required
            - protected_path_policy_enforced
            - witness_before_write_required
            - server_side_secret_handling
            - worker_lane_separated
          additionalProperties: false
        protected_paths:
          type: array
          items:
            type: string
        allowed_repos:
          type: array
          items:
            type: string
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/Endpoint"
      required:
        - ok
        - service
        - version
        - openapi
        - auth
        - worker_auth
        - boundaries
        - protected_paths
        - allowed_repos
        - endpoints
      additionalProperties: false
    OrchestrateSubmitRequest:
      type: object
      properties:
        user_request:
          type: string
        requested_by:
          type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
          additionalProperties: false
        constraints:
          type: array
          items:
            type: string
      required: [user_request]
      additionalProperties: false
    OrchestrateSubmitResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        job:
          type: object
          properties:
            job_id:
              type: string
              format: uuid
            status:
              type: string
            artifact:
              $ref: "#/components/schemas/PlanArtifact"
          required: [job_id, status, artifact]
          additionalProperties: false
      required: [ok, job]
      additionalProperties: false
    OrchestrationJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        requested_by:
          type: string
        repo:
          type:
            - string
            - "null"
        user_request:
          type: string
        claimed_by:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_heartbeat_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        result_json:
          type: object
      required:
        - id
        - status
        - requested_by
        - repo
        - user_request
        - claimed_by
        - created_at
        - updated_at
        - last_heartbeat_at
        - completed_at
        - result_json
      additionalProperties: true
    OrchestrationEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        type:
          type: string
        actor:
          type: string
        payload:
          type: object
      required: [id, job_id, ts, type, actor, payload]
      additionalProperties: true
    OrchestrationArtifact:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        content_hash:
          type: string
        artifact_json:
          type: object
      required: [id, created_at, content_hash, artifact_json]
      additionalProperties: true
    OrchestrateJobStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        job:
          $ref: "#/components/schemas/OrchestrationJob"
        events:
          type: array
          items:
            $ref: "#/components/schemas/OrchestrationEvent"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/OrchestrationArtifact"
      required: [ok, job, events, artifacts]
      additionalProperties: false
    PrecommitPlanRequest:
      type: object
      properties:
        user_request:
          type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
          additionalProperties: false
        constraints:
          type: array
          items:
            type: string
      required: [user_request]
      additionalProperties: false
    PlanArtifact:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        mode:
          type: string
          const: proposal_only
        human_readable_summary:
          type: string
        intended_tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              purpose:
                type: string
            required: [name, purpose]
            additionalProperties: false
        intended_writes:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              action:
                type: string
                enum: [create, update, delete]
              summary:
                type: string
            required: [path, action, summary]
            additionalProperties: false
        constraints:
          type: array
          items:
            type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
          required: [repo, branch, allowed_paths, forbidden_paths]
          additionalProperties: false
        warnings:
          type: array
          items:
            type: string
        next_step:
          type: string
        content_hash:
          type: string
      required:
        - id
        - created_at
        - mode
        - human_readable_summary
        - intended_tools
        - intended_writes
        - constraints
        - scope
        - warnings
        - next_step
        - content_hash
      additionalProperties: false
    PrecommitPlanResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        artifact:
          $ref: "#/components/schemas/PlanArtifact"
      required: [ok, artifact]
      additionalProperties: false
    RepoFileRequest:
      type: object
      properties:
        repo:
          type: string
        path:
          type: string
        ref:
          type: string
      required: [repo, path]
      additionalProperties: false
    RepoFileResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        repo:
          type: string
        path:
          type: string
        ref:
          type: string
        sha:
          type: string
        size:
          type: integer
        content:
          type:
            - string
            - "null"
      required: [ok, repo, path, ref, sha, size, content]
      additionalProperties: false
    RepoTreeRequest:
      type: object
      properties:
        repo:
          type: string
        ref:
          type: string
        path_prefix:
          type: string
        limit:
          type: integer
      required: [repo]
      additionalProperties: false
    RepoTreeFile:
      type: object
      properties:
        path:
          type: string
        sha:
          type: string
        size:
          type: integer
        mode:
          type: string
      required: [path, sha, size, mode]
      additionalProperties: false
    RepoTreeResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        repo:
          type: string
        ref:
          type: string
        path_prefix:
          type: string
        truncated:
          type: boolean
        files:
          type: array
          items:
            $ref: "#/components/schemas/RepoTreeFile"
      required: [ok, repo, ref, truncated, files]
      additionalProperties: false
    WriteFile:
      type: object
      properties:
        path:
          type: string
        action:
          type: string
          enum: [create, update]
        content:
          type: string
      required: [path, action, content]
      additionalProperties: false
    WriteSet:
      type: object
      properties:
        branch_name:
          type: string
        base_branch:
          type: string
        title:
          type: string
        body:
          type: string
        repo:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/WriteFile"
          minItems: 1
      required: [branch_name, base_branch, title, repo, files]
      additionalProperties: false
    FreezeWriteSetRequest:
      type: object
      properties:
        write_set:
          $ref: "#/components/schemas/WriteSet"
        plan_artifact_id:
          type: string
        plan_artifact_hash:
          type: string
        frozen_by:
          type: string
      required: [write_set, plan_artifact_id, plan_artifact_hash, frozen_by]
      additionalProperties: false
    FreezeWriteSetResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        artifact:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            content_hash:
              type: string
            write_set_hash:
              type: string
            repo:
              type: string
            branch_name:
              type: string
            base_branch:
              type: string
            files_written:
              type: integer
          required: [id, type, content_hash, write_set_hash, repo, branch_name, base_branch, files_written]
          additionalProperties: false
      required: [ok, artifact]
      additionalProperties: false
    CommitAuthorization:
      type: object
      properties:
        plan_artifact_id:
          type: string
        plan_artifact_hash:
          type: string
        write_set_hash:
          type: string
        frozen_write_set_artifact_id:
          type: string
        frozen_write_set_artifact_hash:
          type: string
        authorized_by:
          type: string
      required: [plan_artifact_id, plan_artifact_hash, authorized_by]
      additionalProperties: false
    CommitExecuteRequest:
      type: object
      properties:
        write_set:
          $ref: "#/components/schemas/WriteSet"
        authorization:
          $ref: "#/components/schemas/CommitAuthorization"
      required: [authorization]
      additionalProperties: false
    CommitExecuteResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        execution:
          type: object
          properties:
            pr_url:
              type: string
              format: uri
            pr_number:
              type: integer
            branch:
              type: string
            repo:
              type: string
            files_written:
              type: integer
            write_set_hash:
              type: string
          required: [pr_url, pr_number, branch, repo, files_written, write_set_hash]
          additionalProperties: false
        witness:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
          required: [id, type]
          additionalProperties: false
      required: [ok, execution, witness]
      additionalProperties: false
paths:
  /api/founderos/health:
    get:
      operationId: health
      summary: Public liveness check
      security: []
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/capabilities:
    get:
      operationId: capabilities
      summary: Describe the exact v1 control-plane contract
      security: []
      responses:
        "200":
          description: Capabilities returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/capabilities/check:
    post:
      operationId: capabilitiesCheck
      summary: POST mirror of capabilities for GPT Action auth diagnostics
      security:
        - FounderosApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ping:
                  type: string
                  description: Optional no-op field for clients that require a concrete JSON object schema.
              additionalProperties: false
      responses:
        "200":
          description: Capabilities returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/precommit/plan:
    post:
      operationId: precommitPlan
      summary: Produce a proposal artifact only
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrecommitPlanRequest"
      responses:
        "200":
          description: Proposal artifact returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrecommitPlanResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/repo/file:
    post:
      operationId: repoFile
      summary: Read one file from an allowlisted GitHub repo
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoFileRequest"
      responses:
        "200":
          description: File content returned from the live GitHub repo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoFileResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Repo rejected by server policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing GitHub configuration or GitHub read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/repo/tree:
    post:
      operationId: repoTree
      summary: List files from an allowlisted GitHub repo
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoTreeRequest"
      responses:
        "200":
          description: File list returned from the live GitHub repo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoTreeResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Repo rejected by server policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing GitHub configuration or GitHub read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/commit/freeze-write-set:
    post:
      operationId: freezeWriteSet
      summary: Persist one exact canonical write set server-side for later governed execution
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreezeWriteSetRequest"
      responses:
        "200":
          description: Frozen write set artifact returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreezeWriteSetResponse"
        "400":
          description: Invalid request body or write set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Repo or path rejected by server policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Artifact storage is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/commit/execute:
    post:
      operationId: commitExecute
      summary: Execute one exact pre-authorized write set or a server-frozen write set artifact
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitExecuteRequest"
      responses:
        "200":
          description: Pull request opened from the exact authorized write set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitExecuteResponse"
        "400":
          description: Invalid request body or hash mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Repo or path rejected by server policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing required server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Witness sink or GitHub API failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/orchestrate/submit:
    post:
      operationId: orchestrateSubmit
      summary: Queue an async orchestration job for the private worker lane
      security:
        - FounderosApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestrateSubmitRequest"
      responses:
        "202":
          description: Job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrateSubmitResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing orchestration storage configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Orchestration persistence failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/founderos/orchestrate/jobs/{job_id}:
    get:
      operationId: orchestrateJobStatus
      summary: Read durable status for one orchestration job
      security:
        - FounderosApiKey: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrateJobStatusResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing orchestration storage configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Orchestration read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
