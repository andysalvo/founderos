openapi: 3.1.0
info:
  title: Founderos APS
  version: 1.0.0
  description: Minimal APS-aligned control plane for a Custom GPT action backend on Vercel.
servers:
  - url: https://founderos-alpha.vercel.app
security:
  - FounderosApiKey: []
components:
  securitySchemes:
    FounderosApiKey:
      type: apiKey
      in: header
      name: x-founderos-key
  schemas:
    RuntimeContext:
      type: object
      properties:
        commit_sha:
          type:
            - string
            - "null"
        commit_source:
          type: string
      required: [commit_sha, commit_source]
      additionalProperties: false
    WorkerRuntime:
      type: object
      properties:
        worker_id:
          type:
            - string
            - "null"
        worker_commit_sha:
          type:
            - string
            - "null"
        worker_commit_source:
          type:
            - string
            - "null"
        worker_version:
          type:
            - string
            - "null"
      required: [worker_id, worker_commit_sha, worker_commit_source, worker_version]
      additionalProperties: false
    PolicyBearingArtifact:
      type: object
      properties:
        match:
          type: string
          enum: [exact, prefix]
        path:
          type: string
        artifact_type:
          type: string
        enforcement:
          type: string
          enum: [protected, review_required]
      required: [match, path, artifact_type, enforcement]
      additionalProperties: false
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
      required: [ok, error]
      additionalProperties: true
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        service:
          type: string
        version:
          type: string
        runtime:
          $ref: "#/components/schemas/RuntimeContext"
        timestamp:
          type: string
          format: date-time
      required: [ok, service, version, runtime, timestamp]
      additionalProperties: false
    Endpoint:
      type: object
      properties:
        operationId:
          type: string
        method:
          type: string
        path:
          type: string
        auth:
          type: string
        purpose:
          type: string
      required: [operationId, method, path, auth, purpose]
      additionalProperties: false
    CapabilitiesResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        service:
          type: string
        version:
          type: string
        runtime:
          $ref: "#/components/schemas/RuntimeContext"
        openapi:
          type: object
          properties:
            path:
              type: string
            version:
              type: string
          required: [path, version]
          additionalProperties: false
        auth:
          type: object
          properties:
            type:
              type: string
            header:
              type: string
            configured:
              type: boolean
            env:
              type:
                - string
                - "null"
            compatibility_fallback_active:
              type: boolean
          required: [type, header, configured, env, compatibility_fallback_active]
          additionalProperties: false
        worker_auth:
          type: object
          properties:
            type:
              type: string
            header:
              type: string
            configured:
              type: boolean
          required: [type, header, configured]
          additionalProperties: false
        boundaries:
          type: object
          properties:
            narrow_commitment_boundary:
              type: boolean
            planning_only_precommit:
              type: boolean
            explicit_authorization_required:
              type: boolean
            protected_path_policy_enforced:
              type: boolean
            policy_bearing_artifact_classification:
              type: boolean
            witness_before_write_required:
              type: boolean
            server_side_secret_handling:
              type: boolean
            worker_lane_separated:
              type: boolean
            deterministic_mutation_translation_required:
              type: boolean
            governed_pr_merge_available:
              type: boolean
          required:
            - narrow_commitment_boundary
            - planning_only_precommit
            - explicit_authorization_required
            - protected_path_policy_enforced
            - policy_bearing_artifact_classification
            - witness_before_write_required
            - server_side_secret_handling
            - worker_lane_separated
            - deterministic_mutation_translation_required
            - governed_pr_merge_available
          additionalProperties: false
        protected_paths:
          type: array
          items:
            type: string
        policy_bearing_artifacts:
          type: array
          items:
            $ref: "#/components/schemas/PolicyBearingArtifact"
        allowed_repos:
          type: array
          items:
            type: string
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/Endpoint"
      required:
        - ok
        - service
        - version
        - runtime
        - openapi
        - auth
        - worker_auth
        - boundaries
        - protected_paths
        - policy_bearing_artifacts
        - allowed_repos
        - endpoints
      additionalProperties: false
    OrchestrateSubmitRequest:
      type: object
      properties:
        user_request:
          type: string
        requested_by:
          type: string
        requested_by_lane:
          type: string
        requested_by_subject_type:
          type: string
        model_identity:
          type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
            project_slug:
              type: string
            task_kind:
              type: string
            anchor_paths:
              type: array
              items:
                type: string
            provider:
              type: string
            execution_mode:
              type: string
            strategy_name:
              type: string
            asset:
              type: string
            timeframe:
              type: string
          additionalProperties: false
        constraints:
          type: array
          items:
            type: string
      required: [user_request]
      additionalProperties: false
    OrchestrateSubmitResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        job:
          type: object
          properties:
            job_id:
              type: string
              format: uuid
            status:
              type: string
            artifact:
              $ref: "#/components/schemas/PlanArtifact"
          required: [job_id, status, artifact]
          additionalProperties: false
      required: [ok, job]
      additionalProperties: false
    OrchestrationJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        requested_by:
          type: string
        repo:
          type:
            - string
            - "null"
        user_request:
          type: string
        claimed_by:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_heartbeat_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        result_json:
          type: object
      required:
        - id
        - status
        - requested_by
        - repo
        - user_request
        - claimed_by
        - created_at
        - updated_at
        - last_heartbeat_at
        - completed_at
        - result_json
      additionalProperties: true
    OrchestrationEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        type:
          type: string
        actor:
          type: string
        payload:
          type: object
      required: [id, job_id, ts, type, actor, payload]
      additionalProperties: true
    OrchestrationArtifact:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        content_hash:
          type: string
        artifact_json:
          type: object
      required: [id, created_at, content_hash, artifact_json]
      additionalProperties: true
    OrchestrateJobStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        job:
          $ref: "#/components/schemas/OrchestrationJob"
        events:
          type: array
          items:
            $ref: "#/components/schemas/OrchestrationEvent"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/OrchestrationArtifact"
      required: [ok, job, events, artifacts]
      additionalProperties: false
    PrecommitPlanRequest:
      type: object
      properties:
        user_request:
          type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
            project_slug:
              type: string
            task_kind:
              type: string
            anchor_paths:
              type: array
              items:
                type: string
            provider:
              type: string
            execution_mode:
              type: string
            strategy_name:
              type: string
            asset:
              type: string
            timeframe:
              type: string
          additionalProperties: false
        constraints:
          type: array
          items:
            type: string
      required: [user_request]
      additionalProperties: false
    PlanArtifact:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        mode:
          type: string
          const: proposal_only
        human_readable_summary:
          type: string
        intended_tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              purpose:
                type: string
            required: [name, purpose]
            additionalProperties: false
        intended_writes:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              action:
                type: string
                enum: [create, update, delete]
              summary:
                type: string
            required: [path, action, summary]
            additionalProperties: false
        constraints:
          type: array
          items:
            type: string
        scope:
          type: object
          properties:
            repo:
              type: string
            branch:
              type: string
            allowed_paths:
              type: array
              items:
                type: string
            forbidden_paths:
              type: array
              items:
                type: string
            project_slug:
              type: string
            task_kind:
              type: string
            anchor_paths:
              type: array
              items:
                type: string
            provider:
              type: string
            execution_mode:
              type: string
            strategy_name:
              type: string
            asset:
              type: string
            timeframe:
              type: string
          required:
            [repo, branch, allowed_paths, forbidden_paths, project_slug, task_kind, anchor_paths, provider, execution_mode, strategy_name, asset, timeframe]
          additionalProperties: false
        warnings:
          type: array
          items:
            type: string
        next_step:
          type: string
        content_hash:
          type: string
      required:
        - id
        - created_at
        - mode
        - human_readable_summary
        - intended_tools
        - intended_writes
        - constraints
        - scope
        - warnings
        - next_step
        - content_hash
      additionalProperties: false
    PrecommitPlanResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        artifact:
          $ref: "#/components/schemas/PlanArtifact"
      required: [ok, artifact]
      additionalProperties: false
    TradingCandidateSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        asset:
          type: string
        timeframe:
          type: string
        venue:
          type: string
        execution_mode:
          type: string
        strategy_name:
          type:
            - string
            - "null"
        strategy_version:
          type:
            - string
            - "null"
        status:
          type: string
        max_risk:
          type:
            - number
            - "null"
        payload_json:
          type: object
        decision_json:
          type: object
      required: [id, created_at, updated_at, asset, timeframe, venue, execution_mode, strategy_name, strategy_version, status, max_risk, payload_json, decision_json]
      additionalProperties: true
    ApprovalDecisionRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        candidate_id:
          type: string
          format: uuid
        decision:
          type: string
        decided_by:
          type: string
        note:
          type:
            - string
            - "null"
        context_json:
          type: object
        created_at:
          type: string
          format: date-time
      required: [id, candidate_id, decision, decided_by, note, context_json, created_at]
      additionalProperties: true
    BrokerOrderRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        candidate_id:
          type:
            - string
            - "null"
          format: uuid
        provider_order_id:
          type:
            - string
            - "null"
        client_order_id:
          type:
            - string
            - "null"
        asset:
          type: string
        order_type:
          type: string
        side:
          type: string
        time_in_force:
          type:
            - string
            - "null"
        status:
          type: string
        submitted_at:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type: string
          format: date-time
        provider_payload_json:
          type: object
      required: [id, candidate_id, provider_order_id, client_order_id, asset, order_type, side, time_in_force, status, submitted_at, updated_at, provider_payload_json]
      additionalProperties: true
    TradingCandidatesResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/TradingCandidateSummary"
      required: [ok, candidates]
      additionalProperties: false
    TradingCandidateResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        candidate:
          $ref: "#/components/schemas/TradingCandidateSummary"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalDecisionRecord"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/BrokerOrderRecord"
      required: [ok, candidate, decisions, orders]
      additionalProperties: false
    TradingDecisionRequest:
      type: object
      properties:
        decision:
          type: string
          enum: [approve, reject]
        authorized_by:
          type: string
        note:
          type: string
        execution_mode:
          type: string
        context_json:
          type: object
      required: [decision, authorized_by]
      additionalProperties: false
    TradingDecisionResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        candidate:
          $ref: "#/components/schemas/TradingCandidateSummary"
        decision:
          $ref: "#/components/schemas/ApprovalDecisionRecord"
        live_authority_state:
          type: object
          properties:
            stage:
              type: string
            enabled:
              type: boolean
            basis:
              type: string
          required: [stage, enabled, basis]
          additionalProperties: false
      required: [ok, candidate, decision, live_authority_state]
      additionalProperties: false
    TradingJournalEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset:
          type: string
        timeframe:
          type: string
        venue:
          type: string
        execution_mode:
          type: string
        strategy_name:
          type: string
        status:
          type: string
        updated_at:
          type: string
          format: date-time
      required: [id, asset, timeframe, venue, execution_mode, strategy_name, status, updated_at]
      additionalProperties: true
    TradingJournalResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TradingJournalEntry"
      required: [ok, entries]
      additionalProperties: false
    EvaluationRunRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        strategy_id:
          type:
            - string
            - "null"
          format: uuid
        dataset_id:
          type: string
        mode:
          type: string
        trial_count:
          type: integer
        pbo:
          type:
            - number
            - "null"
        dsr:
          type:
            - number
            - "null"
        serial_correlation_adjusted_sharpe:
          type:
            - number
            - "null"
        result_summary:
          type: string
        created_at:
          type: string
          format: date-time
        metrics_json:
          type: object
      required: [id, strategy_id, dataset_id, mode, trial_count, pbo, dsr, serial_correlation_adjusted_sharpe, result_summary, created_at, metrics_json]
      additionalProperties: true
    TradingBacktestResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        run:
          $ref: "#/components/schemas/EvaluationRunRecord"
      required: [ok, run]
      additionalProperties: false
    BrokerConnectorHealth:
      type: object
      properties:
        connector_id:
          type: string
        provider:
          type: string
        role:
          type: string
        mode:
          type: string
        credential_owner:
          type: string
        status:
          type: string
        health_status:
          type: string
        live_authority_stage:
          type: string
        last_checked_at:
          type: string
          format: date-time
      required: [connector_id, provider, role, mode, credential_owner, status, health_status, live_authority_stage, last_checked_at]
      additionalProperties: false
    TradingConnectorsHealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        connectors:
          type: array
          items:
            $ref: "#/components/schemas/BrokerConnectorHealth"
        live_authority_state:
          type: object
          properties:
            stage:
              type: string
            enabled:
              type: boolean
            basis:
              type: string
          required: [stage, enabled, basis]
          additionalProperties: false
      required: [ok, connectors, live_authority_state]
      additionalProperties: false
    RepoFileRequest:
      type: object
      properties:
        repo:
          type: string
        path:
          type: string
        ref:
          type: string
      required: [repo, path]
      additionalProperties: false
    RepoFileResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        repo:
          type: string
        path:
          type: string
        ref:
          type: string
        sha:
          type: string
        size:
          type: integer
        content:
          type:
            - string
            - "null"
      required: [ok, repo, path, ref, sha, size, content]
      additionalProperties: false
    RepoTreeRequest:
      type: object
      properties:
        repo:
          type: string
        ref:
          type: string
        path_prefix:
          type: string
        limit:
          type: integer
      required: [repo]
      additionalProperties: false
    RepoTreeFile:
      type: object
      properties:
        path:
          type: string
        sha:
          type: string
        size:
          type: integer
        mode:
          type: string
      required: [path, sha, size, mode]
      additionalProperties: false
    RepoTreeResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        repo:
          type: string
        ref:
          type: string
        path_prefix:
          type: string
        truncated:
          type: boolean
        files:
          type: array
          items:
            $ref: "#/components/schemas/RepoTreeFile"
      required: [ok, repo, ref, truncated, files]
      additionalProperties: false
    WriteFile:
      type: object
      properties:
        path:
          type: string
        action:
          type: string
          enum: [create, update]
        content:
          type: string
      required: [path, action, content]
      additionalProperties: false
    WriteSet:
      type: object
      properties:
        branch_name:
          type: string
        base_branch:
          type: string
        title:
          type: string
        body:
          type: string
        repo:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/WriteFile"
          minItems: 1
      required: [branch_name, base_branch, title, repo, files]
      additionalProperties: false
    FreezeWriteSetRequest:
      type: object
      properties:
        write_set:
          $ref: "#/components/schemas/WriteSet"
        plan_artifact_id:
          type: string
        plan_artifact_hash:
          type: string
        frozen_by:
          type: string
      required: [write_set, plan_artifact_id, plan_artifact_hash, frozen_by]
      additionalProperties: false
    FreezeWriteSetResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        artifact:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            content_hash:
              type: string
            write_set_hash:
              type: string
            repo:
              type: string
            branch_name:
              type: string
            base_branch:
              type: string
            files_written:
              type: integer
          required: [id, type, content_hash, write_set_hash, repo, branch_name, base_branch, files_written]
          additionalProperties: false
      required: [ok, artifact]
      additionalProperties: false
    CommitAuthorization:
      type: object
      properties:
        plan_artifact_id:
          type: string
        plan_artifact_hash:
          type: string
        write_set_hash:
          type: string
        frozen_write_set_artifact_id:
          type: string
        frozen_write_set_artifact_hash:
          type: string
        authorized_by:
          type: string
        actor_lane:
          type: string
        actor_subject_type:
          type: string
        actor_subject:
          type: string
        job_id:
          type: string
        model_identity:
          type: string
        worker_runtime:
          $ref: "#/components/schemas/WorkerRuntime"
      required: [plan_artifact_id, plan_artifact_hash, authorized_by]
      additionalProperties: false
    CommitExecuteRequest:
      type: object
      properties:
        write_set:
          $ref: "#/components/schemas/WriteSet"
        authorization:
          $ref: "#/components/schemas/CommitAuthorization"
      required: [authorization]
      additionalProperties: false
    CommitExecuteResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        execution:
          type: object
          properties:
            pr_url:
              type: string
              format: uri
            pr_number:
              type: integer
            branch:
              type: string
            repo:
              type: string
            files_written:
              type: integer
            write_set_hash:
              type: string
          required: [pr_url, pr_number, branch, repo, files_written, write_set_hash]
          additionalProperties: false
        witness:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
          required: [id, type]
          additionalProperties: false
      required: [ok, execution, witness]
      additionalProperties: false
    MergePrAuthorization:
      type: object
      properties:
        action:
          type: string
          const: merge_pull_request
        authorized_by:
          type: string
        expected_head_sha:
          type: string
        expected_base_branch:
          type: string
        merge_method:
          type: string
          enum: [squash]
        actor_lane:
          type: string
        actor_subject_type:
          type: string
        actor_subject:
          type: string
        job_id:
          type: string
        model_identity:
          type: string
        worker_runtime:
          $ref: "#/components/schemas/WorkerRuntime"
      required: [action, authorized_by, expected_head_sha, expected_base_branch]
      additionalProperties: false
    MergePrRequest:
      type: object
      properties:
        repo:
          type: string
        pull_number:
          type: integer
        authorization:
          $ref: "#/components/schemas/MergePrAuthorization"
      required: [repo, pull_number, authorization]
      additionalProperties: false
    MergePrResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        execution:
          type: object
          properties:
            repo:
              type: string
            pr_number:
              type: integer
            pr_url:
              type: string
              format: uri
            merge_method:
              type: string
              const: squash
            merged:
              type: boolean
            merge_commit_sha:
              type:
                - string
                - "null"
            head_sha:
              type: string
            base_branch:
              type: string
          required: [repo, pr_number, pr_url, merge_method, merged, merge_commit_sha, head_sha, base_branch]
          additionalProperties: false
        witness:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            completion_id:
              type: string
          required: [id, type, completion_id]
          additionalProperties: false
      required: [ok, execution, witness]
      additionalProperties: false
